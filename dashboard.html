      inst = 'In your ' + P.accounting + ' profit and loss for these dates, add the wages and super lines, then divide by the revenue figure you verified. Does it come to the percentage above?';
    } else {
      inst = 'Open ' + P.accounting + ' and run your profit and loss for exactly these dates. Does ' + def.label + ' there match the figure above, to the cent?';
    }
    card.appendChild(el('div', 'recon-inst', esc(inst)));

    var stateLine = el('div', 'recon-state');
    if (RECON[k] === 'confirmed') { stateLine.innerHTML = '<span class="up">✓ Confirmed against your records</span>'; }
    else if (RECON[k] === 'flagged') { stateLine.innerHTML = '<span class="down">Marked as needing a check</span>'; }
    else { stateLine.innerHTML = '<span class="flat">Not checked yet</span>'; }
    card.appendChild(stateLine);

    var act = el('div', 'conn-actions');
    var yes = el('button', 'btn-small', 'It matches');
    yes.onclick = function () { RECON[k] = 'confirmed'; saveRecon(); render(); };
    var no = el('button', 'btn-plain', 'It doesn’t match');
    no.onclick = function () { RECON[k] = 'flagged'; saveRecon(); render(); };
    act.appendChild(yes); act.appendChild(no);
    card.appendChild(act);

    if (RECON[k] === 'flagged') {
      var dg = el('div', 'diag');
      dg.innerHTML = '<b>Tell your AI it doesn’t match.</b> It will work through the usual culprits, in order:'
        + '<ol>'
        + '<li>Wrong accounts mapped (an account included that shouldn’t be, or one missed)</li>'
        + '<li>Wrong dates, timezone, week start or trading-day rollover</li>'
        + '<li>Report basis: cash vs accrual, matched to the report you actually ran</li>'
        + '<li>' + esc(KIT_CONFIG.taxLabel === 'ex-GST' ? 'GST left in, or taken out twice' : 'Sales tax left in, or taken out twice') + '</li>'
        + '<li>A missing or extra sales channel, or other income bleeding into revenue</li>'
        + '</ol>';
      card.appendChild(dg);
    }
    root.appendChild(card);
  });

  if (!anyReady) {
    root.appendChild(el('p', 'screen-sub', 'Nothing to check yet: no data source is connected. As each tool connects, its numbers appear here for you to verify.'));
  }
}

/* ---------- Settings ---------- */
var TAX_WORD = (KIT_CONFIG.taxLabel || 'ex-GST').replace('ex-', '');
var MANUAL_FIELDS = [
  { key: 'revenue',    label: 'Revenue (' + KIT_CONFIG.taxLabel + ')', kind: 'money',
    help: 'The total trading income on your profit and loss for these dates, before ' + TAX_WORD + '.' },
  { key: 'count',      label: 'Number of transactions', kind: 'int',
    help: 'How many completed sales your POS report shows for these dates. Just the count, not dollars.' },
  { key: 'cogs',       label: 'Cost of goods (Cost of Sales)', kind: 'money',
    help: 'Your Cost of Sales total on the profit and loss for these dates.' },
  { key: 'wagesSuper', label: 'Wages plus super', kind: 'money',
    help: 'Your wages and super total on the profit and loss for these dates.' },
  { key: 'overheads',  label: 'Overheads', kind: 'money',
    help: 'Operating expenses on the profit and loss for these dates, not counting wages, super or cost of sales.' },
  { key: 'rosteredCost', label: 'Rostered cost (' + (P.rostering || 'Rostering') + ')', kind: 'money',
    help: 'The total rostered cost from your rostering tool for these dates (optional).' }
];

/* ---------- Manual entry ---------- */
function renderManualEntry(root) {
  root.appendChild(el('div', 'screen-title', 'Enter numbers'));
  root.appendChild(el('p', 'screen-sub', 'Type in your figures for any period. They show on the Dashboard until a live connection replaces them.'));

  var ENTRY_PERIODS = PERIODS.filter(function (p) { return p.key !== 'custom'; });
  var ep = state.enterPeriod || state.period;
  if (ep === 'custom') ep = 'thisWeek';

  var bar = el('div', 'period-bar');
  bar.appendChild(el('span', 'period-label', 'Period'));
  ENTRY_PERIODS.forEach(function (p) {
    var c = el('button', 'pchip' + (ep === p.key ? ' on' : ''), p.label);
    c.onclick = function () { state.enterPeriod = p.key; render(); };
    bar.appendChild(c);
  });
  root.appendChild(bar);

  var r = resolvePeriod(ep, null, null);
  root.appendChild(el('div', 'period-heading', PERIODS.filter(function(x){return x.key===ep;})[0].label + ' <span>· ' + esc(fmtRange(r)) + '</span>'));

  var saved = manualEntry({ from: r.from, to: r.to }) || {};
  var form = el('div', 'set-section');

  MANUAL_FIELDS.forEach(function (f) {
    if (f.key === 'rosteredCost' && !P.rostering) return;
    var row = el('div', 'set-row');
    var label = el('label', 'set-label');
    label.htmlFor = 'mf_' + f.key;
    label.textContent = f.label;
    row.appendChild(label);
    var inp = document.createElement('input');
    inp.id = 'mf_' + f.key;
    inp.type = f.kind === 'int' ? 'number' : 'text';
    inp.className = 'set-input';
    inp.placeholder = f.kind === 'int' ? '0' : '0.00';
    if (saved.values && saved.values[f.key] != null) inp.value = saved.values[f.key];
    row.appendChild(inp);
    if (f.help) row.appendChild(el('div', 'set-hint', f.help));
    form.appendChild(row);
  });

  var saveBtn = el('button', 'btn-save', 'Save these numbers');
  saveBtn.onclick = function () {
    var vals = {};
    MANUAL_FIELDS.forEach(function (f) {
      var inp = document.getElementById('mf_' + f.key);
      if (!inp) return;
      var raw = inp.value.trim().replace(/[$,]/g, '');
      if (raw === '') return;
      var n = parseFloat(raw);
      if (!isNaN(n)) vals[f.key] = n;
    });
    var key = rangeKey(r.from, r.to);
    MANUAL[key] = { from: r.from, to: r.to, period: ep, values: vals, attested: true, enteredAt: new Date().toISOString() };
    saveManual();
    state.view = 'dashboard';
    state.period = ep;
    state.data = null;
    render();
  };
  form.appendChild(saveBtn);

  if (saved.attested) {
    var del = el('button', 'btn-plain', 'Clear these numbers');
    del.style.marginLeft = '10px';
    del.onclick = function () {
      delete MANUAL[rangeKey(r.from, r.to)];
      saveManual();
      render();
    };
    form.appendChild(del);
  }

  root.appendChild(form);
  root.appendChild(el('p', 'set-note', 'After you save, open the Dashboard tab to see these numbers, how they compare to the period before, and where they need your attention.'));
}

/* ---------- Settings ---------- */
function renderSettings(root) {
  root.appendChild(el('div', 'screen-title', 'Settings'));

  function section(label) {
    var s = el('div', 'set-section');
    s.appendChild(el('div', 'section-sub', label));
    return s;
  }
  function row(labelText, inputEl, hint) {
    var r = el('div', 'set-row');
    var lbl = el('label', 'set-label', labelText);
    r.appendChild(lbl);
    r.appendChild(inputEl);
    if (hint) r.appendChild(el('div', 'set-hint', hint));
    return r;
  }
  function inp(type, val, onchange) {
    var i = document.createElement('input');
    i.type = type; i.value = val; i.className = 'set-input';
    i.onchange = onchange;
    return i;
  }
  function sel(opts, val, onchange) {
    var s = document.createElement('select');
    s.className = 'set-input';
    opts.forEach(function (o) {
      var opt = document.createElement('option');
      opt.value = o.value != null ? o.value : o;
      opt.textContent = o.label != null ? o.label : o;
      if (opt.value === String(val)) opt.selected = true;
      s.appendChild(opt);
    });
    s.onchange = onchange;
    return s;
  }

  /* Venue */
  var vs = section('Your venue');
  vs.appendChild(row('Venue name', inp('text', SETTINGS.venueName, function () { SETTINGS.venueName = this.value; saveSettings(); render(); })));
  root.appendChild(vs);

  /* Display */
  var ds = section('Display');
  ds.appendChild(row('Default period',
    sel(PERIODS.filter(function(p){return p.key!=='custom';}), SETTINGS.defaultPeriod, function () { SETTINGS.defaultPeriod = this.value; saveSettings(); }),
    'The period shown when you first open the dashboard.'));
  ds.appendChild(row('Week starts',
    sel([{value:'1',label:'Monday'},{value:'0',label:'Sunday'}], SETTINGS.weekStart, function () { SETTINGS.weekStart = parseInt(this.value); saveSettings(); fetchData(); })));

  var tzOpts = (TZ_CHOICES[KIT_CONFIG.region] || ['Australia/Sydney']).map(function (z) { return { value: z, label: z }; });
  ds.appendChild(row('Timezone', sel(tzOpts, SETTINGS.timezone, function () { SETTINGS.timezone = this.value; saveSettings(); fetchData(); })));
  root.appendChild(ds);

  /* Targets */
  var ts = section('Targets (% of revenue)');
  ['cogs','wage','overheads','profit'].forEach(function (k) {
    var def = METRIC_DEFS[k];
    if (!def || !def.dual) return;
    var tRow = row(def.label + ' target (%)',
      inp('number', SETTINGS.targets[k], function () {
        SETTINGS.targets[k] = parseFloat(this.value) || 0;
        saveSettings();
      }),
      'Alert shows when ' + def.label.toLowerCase() + (def.goodDir === 'down' ? ' exceeds' : ' falls below') + ' this %.');
    ts.appendChild(tRow);
  });
  root.appendChild(ts);

  /* Accent */
  var as = section('Colour accent');
  var ap = el('div', 'accent-picker');
  ACCENTS.forEach(function (a) {
    var sw = el('button', 'accent-swatch' + (SETTINGS.accent === a.key ? ' on' : ''));
    sw.style.background = a.c;
    sw.onclick = function () { SETTINGS.accent = a.key; saveSettings(); document.documentElement.style.setProperty('--accent', a.c); document.documentElement.style.setProperty('--accent-dim', a.dim); render(); };
    ap.appendChild(sw);
  });
  as.appendChild(ap);
  root.appendChild(as);

  /* Data mode */
  if (KIT_CONFIG.startLevel !== 'live') {
    var ms = section('Data mode');
    ms.appendChild(el('p', 'set-note', 'Manual mode: numbers you enter on the Enter tab. Live mode: numbers pulled live from your connected tools.'));
    var mb = el('div', 'set-row');
    var mSel = sel([{value:'live',label:'Live (from your tools)'},{value:'manual',label:'Manual (you enter the numbers)'}], SETTINGS.dataMode, function () {
      SETTINGS.dataMode = this.value; saveSettings(); fetchData();
    });
    mb.appendChild(mSel);
    ms.appendChild(mb);
    root.appendChild(ms);
  }

  /* Sign out */
  var soSec = section('Account');
  soSec.appendChild(el('p', 'set-note', 'Sign out of this dashboard on this device. You will need your password to sign back in.'));
  var soBtn = el('button', 'btn-plain', 'Sign out');
  soBtn.style.marginTop = '8px';
  soBtn.onclick = function () {
    fetch('/api/logout', { method: 'POST' }).then(function () { location.reload(); });
  };
  soSec.appendChild(soBtn);
  root.appendChild(soSec);
}

/* ============================================================
   Boot
============================================================ */
(function () {
  var acc = ACCENTS.filter(function (a) { return a.key === SETTINGS.accent; })[0] || ACCENTS[0];
  document.documentElement.style.setProperty('--accent', acc.c);
  document.documentElement.style.setProperty('--accent-dim', acc.dim);
})();

render();
fetchData();
</script>
</body>
</html>
